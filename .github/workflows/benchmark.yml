name: Continuous Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run Benchmark
      run: |
        dotnet run --project gc/gc.csproj -- --benchmark 2>&1 | tee benchmark_results.txt

    - name: Extract Metrics
      id: metrics
      run: |
        DISCOVERY_TIME=$(grep -oP "Discovery time:.*?\K[0-9]+(?= ms)" benchmark_results.txt || echo "0")
        READ_TIME=$(grep -oP "Read time:.*?\K[0-9]+(?= ms)" benchmark_results.txt | head -1 || echo "0")
        TOTAL_TIME=$(grep -oP "Total time:.*?\K[0-9]+(?= ms)" benchmark_results.txt || echo "0")

        echo "discovery_time=${DISCOVERY_TIME}" >> $GITHUB_OUTPUT
        echo "read_time=${READ_TIME}" >> $GITHUB_OUTPUT
        echo "total_time=${TOTAL_TIME}" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT

    - name: Update BENCHMARK.md
      run: |
        echo '# 📊 Real Performance Data' > BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo 'Latest benchmark results from automated testing:' >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo '| Metric | Value |' >> BENCHMARK.md
        echo '|--------|-------|' >> BENCHMARK.md
        echo "| Discovery Time | ${{ steps.metrics.outputs.discovery_time }} ms |" >> BENCHMARK.md
        echo "| File Read Time | ${{ steps.metrics.outputs.read_time }} ms |" >> BENCHMARK.md
        echo "| Total Time | ${{ steps.metrics.outputs.total_time }} ms |" >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo "*Last updated: ${{ steps.metrics.outputs.timestamp }}*" >> BENCHMARK.md

    - name: Commit Updated BENCHMARK.md
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add BENCHMARK.md || true
        git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update benchmark data - ${{ steps.metrics.outputs.timestamp }}"
        git push || echo "No changes to commit"
