name: Continuous Benchmark

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run Benchmark
      run: |
        dotnet run --project GC/GC.csproj -- --benchmark 2>&1 | tee benchmark_results.txt

    - name: Extract Metrics
      id: metrics
      run: |
        DISCOVERY_TIME=$(grep "Discovery time:" benchmark_results.txt | awk '{print $3}' | tr -d ' ms')
        READ_TIME=$(grep "Read time:" benchmark_results.txt | head -1 | awk '{print $3}' | tr -d ' ms')
        TOTAL_TIME=$(grep "Total time:" benchmark_results.txt | awk '{print $3}' | tr -d ' ms')

        echo "discovery_time=${DISCOVERY_TIME:-0}" >> $GITHUB_OUTPUT
        echo "read_time=${READ_TIME:-0}" >> $GITHUB_OUTPUT
        echo "total_time=${TOTAL_TIME:-0}" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT

    - name: Update README with Real Data
      run: |
        # Remove old benchmark section
        sed -i '/<!-- BENCHMARK_START -->/,<!-- BENCHMARK_END -->/d' README.md || true

        # Add new benchmark section
        echo '<!-- BENCHMARK_START -->' >> README.md
        echo '## 📊 Real Performance Data' >> README.md
        echo '' >> README.md
        echo 'Latest benchmark results from automated testing:' >> README.md
        echo '' >> README.md
        echo '| Metric | Value |' >> README.md
        echo '|--------|-------|' >> README.md
        echo "| Discovery Time | ${{ steps.metrics.outputs.discovery_time }} ms |" >> README.md
        echo "| File Read Time | ${{ steps.metrics.outputs.read_time }} ms |" >> README.md
        echo "| Total Time | ${{ steps.metrics.outputs.total_time }} ms |" >> README.md
        echo '' >> README.md
        echo "*Last updated: ${{ steps.metrics.outputs.timestamp }}*" >> README.md
        echo '<!-- BENCHMARK_END -->' >> README.md

    - name: Commit Updated README
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md || true
        git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update benchmark data - ${{ steps.metrics.outputs.timestamp }}"
        git push || echo "No changes to commit"
