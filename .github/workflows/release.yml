name: Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact_name: gc-linux-x64
            asset_name: gc-linux-x64.tar.gz
          - os: ubuntu-latest
            target: linux-arm64
            artifact_name: gc-linux-arm64
            asset_name: gc-linux-arm64.tar.gz
            docker_platform: linux/arm64
            docker_image: ubuntu:22.04
          - os: windows-latest
            target: win-x64
            artifact_name: gc-windows-x64
            asset_name: gc-windows-x64.zip
          - os: macos-latest
            target: osx-x64
            artifact_name: gc-macos-x64
            asset_name: gc-macos-x64.tar.gz
          - os: macos-latest
            target: osx-arm64
            artifact_name: gc-macos-arm64
            asset_name: gc-macos-arm64.tar.gz

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU for multi-architecture Docker builds
      if: matrix.target == 'linux-arm64'
      uses: docker/setup-qemu-action@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore gc/gc.csproj

    - name: Build
      run: dotnet build gc/gc.csproj --configuration Release --no-restore

    - name: Test
      run: dotnet test --no-restore --verbosity normal

    - name: Publish ${{ matrix.target }}
      if: matrix.target != 'linux-arm64'
      run: dotnet publish gc/gc.csproj -c Release -r ${{ matrix.target }} --self-contained -p:PublishAot=true -o ./publish/${{ matrix.target }}

    - name: Publish linux-arm64 using Docker
      if: matrix.target == 'linux-arm64'
      run: |
        docker run --rm --platform linux/arm64 -v $PWD:/work -w /work ${{ matrix.docker_image }} bash -c '
          apt-get update &&
          apt-get install -y curl zip build-essential clang libicu-dev libssl-dev libcurl4-openssl-dev &&
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir /usr/share/dotnet &&
          export DOTNET_ROOT=/usr/share/dotnet &&
          export PATH=$DOTNET_ROOT:$PATH &&
          dotnet publish gc/gc.csproj -c Release -r linux-arm64 --self-contained -p:PublishAot=true -o ./publish/linux-arm64
        '

    - name: Create Archive (Unix)
      if: runner.os != 'Windows'
      run: |
        cd publish/${{ matrix.target }}
        tar -czf ../../${{ matrix.asset_name }} .

    - name: Create Archive (Windows)
      if: runner.os == 'Windows'
      run: |
        Compress-Archive -Path publish/${{ matrix.target }}/* -DestinationPath ${{ matrix.asset_name }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ matrix.asset_name }}
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
        name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest' }}
        prerelease: ${{ github.ref_type != 'tag' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
