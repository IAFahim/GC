name: Continuous Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/gc.CLI/gc.CLI.csproj

    - name: Run Benchmark
      run: |
        dotnet run --project src/gc.CLI/gc.CLI.csproj --no-restore -- --benchmark 2>&1 | tee benchmark_results.txt

    - name: Extract Metrics
      id: metrics
      run: |
        cat benchmark_results.txt
        DISCOVERY_TIME=$(grep -oP "Discovery time:\s+\K[0-9]+" benchmark_results.txt || echo "0")
        READ_TIME=$(grep -oP "Read time:\s+\K[0-9]+" benchmark_results.txt | head -1 || echo "0")
        TOTAL_TIME=$(grep -oP "Total time:\s+\K[0-9]+" benchmark_results.txt || echo "0")

        echo "discovery_time=${DISCOVERY_TIME}" >> $GITHUB_OUTPUT
        echo "read_time=${READ_TIME}" >> $GITHUB_OUTPUT
        echo "total_time=${TOTAL_TIME}" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT
        
        echo "Extracted: Discovery=${DISCOVERY_TIME}ms, Read=${READ_TIME}ms, Total=${TOTAL_TIME}ms"

    - name: Update BENCHMARK.md
      run: |
        echo '# Real Performance Data' > BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo 'Latest benchmark results from automated testing:' >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo '| Metric | Value |' >> BENCHMARK.md
        echo '|--------|-------|' >> BENCHMARK.md
        echo "| Discovery Time | ${{ steps.metrics.outputs.discovery_time }} ms |" >> BENCHMARK.md
        echo "| File Read Time | ${{ steps.metrics.outputs.read_time }} ms |" >> BENCHMARK.md
        echo "| Total Time | ${{ steps.metrics.outputs.total_time }} ms |" >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo "*Last updated: ${{ steps.metrics.outputs.timestamp }}*" >> BENCHMARK.md

    - name: Commit and Push Results
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add BENCHMARK.md
        
        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes in BENCHMARK.md, skipping commit."
        else
          git commit -m "docs: Update benchmark results [skip ci]"
          git push origin main
        fi
