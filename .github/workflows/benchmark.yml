name: Continuous Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore src/gc.CLI/gc.CLI.csproj

    # Benchmark the SHIPPED artifact (NativeAOT, optimized) — not `dotnet run`, which measures a
    # Debug/JIT process whose time is dominated by JIT compilation + cold startup, masking the
    # actual pipeline cost and making run-to-run numbers meaningless. RealBenchmark itself warms up
    # and reports the best of several in-process iterations to isolate code cost from runner noise.
    - name: Publish NativeAOT binary
      run: dotnet publish src/gc.CLI/gc.CLI.csproj -c Release -p:PublishAot=true -p:StripSymbols=true -o ./bench-bin

    - name: Run Benchmark
      run: |
        ./bench-bin/gc --benchmark 2>&1 | tee benchmark_results.txt

    - name: Extract Metrics
      id: metrics
      run: |
        cat benchmark_results.txt
        DISCOVERY_TIME=$(grep -oP "Discovery time:\s+\K[0-9]+" benchmark_results.txt | head -1 || echo "0")
        READ_TIME=$(grep -oP "(?<!Large )Read time:\s+\K[0-9]+" benchmark_results.txt | head -1 || echo "0")
        TOTAL_TIME=$(grep -oP "Total time:\s+\K[0-9]+" benchmark_results.txt | head -1 || echo "0")
        LARGE_FILES=$(grep -oP "Large files discovered:\s+\K[0-9,]+" benchmark_results.txt || echo "0")
        LARGE_READ_TIME=$(grep -oP "Large read time:\s+\K[0-9]+" benchmark_results.txt || echo "0")
        LARGE_THROUGHPUT=$(grep -oP "Large throughput:\s+\K[0-9.]+" benchmark_results.txt || echo "0")

        echo "discovery_time=${DISCOVERY_TIME}" >> $GITHUB_OUTPUT
        echo "read_time=${READ_TIME}" >> $GITHUB_OUTPUT
        echo "total_time=${TOTAL_TIME}" >> $GITHUB_OUTPUT
        echo "large_files=${LARGE_FILES}" >> $GITHUB_OUTPUT
        echo "large_read_time=${LARGE_READ_TIME}" >> $GITHUB_OUTPUT
        echo "large_throughput=${LARGE_THROUGHPUT}" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT

        echo "Extracted: Discovery=${DISCOVERY_TIME}ms, Read=${READ_TIME}ms, Total=${TOTAL_TIME}ms, LargeRead=${LARGE_READ_TIME}ms @ ${LARGE_THROUGHPUT} MB/s"

    - name: Update BENCHMARK.md
      run: |
        echo '# Real Performance Data' > BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo 'Measured on the published NativeAOT binary (the shipped artifact), best of 5 warm runs:' >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo '## This repository (small workload)' >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo '| Metric | Value |' >> BENCHMARK.md
        echo '|--------|-------|' >> BENCHMARK.md
        echo "| Discovery Time | ${{ steps.metrics.outputs.discovery_time }} ms |" >> BENCHMARK.md
        echo "| File Read Time | ${{ steps.metrics.outputs.read_time }} ms |" >> BENCHMARK.md
        echo "| Total Time | ${{ steps.metrics.outputs.total_time }} ms |" >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo '## Synthetic large workload (~1,500 files incl. large files)' >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo 'Exercises the parallel read + generate pipeline at scale.' >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo '| Metric | Value |' >> BENCHMARK.md
        echo '|--------|-------|' >> BENCHMARK.md
        echo "| Files | ${{ steps.metrics.outputs.large_files }} |" >> BENCHMARK.md
        echo "| Read Time | ${{ steps.metrics.outputs.large_read_time }} ms |" >> BENCHMARK.md
        echo "| Throughput | ${{ steps.metrics.outputs.large_throughput }} MB/s |" >> BENCHMARK.md
        echo '' >> BENCHMARK.md
        echo "*Last updated: ${{ steps.metrics.outputs.timestamp }}*" >> BENCHMARK.md

    - name: Commit and Push Results
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add BENCHMARK.md
        
        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes in BENCHMARK.md, skipping commit."
        else
          git commit -m "docs: Update benchmark results [skip ci]"
          git push origin main
        fi
