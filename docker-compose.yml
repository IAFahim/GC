services:
  gc:
    build:
      context: .
      dockerfile: gc/Dockerfile
    image: gc
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["dotnet", "run", "--project", "src/gc.CLI/gc.CLI.csproj", "--", "--help"]

  gc-test:
    build:
      context: .
      dockerfile: gc/Dockerfile
    image: gc
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["dotnet", "test", "tests/gc.Tests/gc.Tests.csproj"]

  gc-bash:
    build:
      context: .
      dockerfile: gc/Dockerfile
    image: gc
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash"]
    stdin_open: true
    tty: true
