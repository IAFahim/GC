name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore gc.sln

    - name: Lint
      run: dotnet format gc.sln --verify-no-changes --no-restore --verbosity diagnostic

    - name: Build
      run: dotnet build gc.sln --configuration Release --no-restore

    - name: Test
      run: >
        dotnet test gc.sln
        --no-restore
        --no-build
        --verbosity normal
        --logger "trx;LogFileName=test-results.trx"
        --results-directory ./test-results

    - name: Cluster Tests
      run: >
        dotnet test gc.sln
        --no-restore
        --no-build
        --verbosity normal
        --filter 'FullyQualifiedName~Cluster'
        --logger "trx;LogFileName=cluster-test-results.trx"
        --results-directory ./test-results

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./test-results/*.trx
        retention-days: 7
