services:
  gc:
    build:
      context: .
      dockerfile: Dockerfile
    image: gc
    volumes:
      - .:/workspace
    working_dir: /workspace

  gc-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test

  gc-bash:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash"]
    stdin_open: true
    tty: true
